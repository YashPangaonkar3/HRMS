{% extends 'base/admin_base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto mt-4">
  <div class="flex items-center mb-8">
    <a href="{% url 'admin_departments' %}" class="text-gray-500 hover:text-indigo-600 mr-4 transition flex items-center bg-white p-2.5 rounded-full shadow-sm hover:shadow-md">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </a>
    <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">Create New Department</h1>
  </div>

  {% if messages %}
    {% for message in messages %}
      <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-lg mb-6 text-sm font-medium animate-pulse">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <div class="bg-white rounded-2xl shadow-xl px-10 py-10 border border-gray-100">
    <form method="POST">
      {% csrf_token %}
      
      <div class="mb-6">
        <label class="block text-sm font-bold text-gray-700 mb-2">Department Name <span class="text-red-500">*</span></label>
        <input type="text" name="name" required placeholder="e.g. Engineering, Human Resources, Accounting..." 
               class="w-full border border-gray-200 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none transition-all shadow-sm">
      </div>

      <div class="mb-10">
        <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
        <textarea name="description" rows="4" placeholder="Brief details about the department's role and responsibilities..." 
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none transition-all shadow-sm"></textarea>
      </div>

      <div class="flex justify-end items-center gap-4 border-t border-gray-100 pt-8">
        <a href="{% url 'admin_departments' %}" class="px-6 py-3 rounded-xl text-gray-600 hover:bg-gray-100 hover:text-gray-900 font-bold transition">Cancel</a>
        <button type="submit" class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 transition transform hover:-translate-y-0.5">Save Department</button>
      </div>

    </form>
  </div>
</div>
{% endblock %}

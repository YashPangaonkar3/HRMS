{% extends 'base/admin_base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="flex items-center mb-8">
    <a href="{% url 'admin_employees' %}" class="text-gray-500 hover:text-gray-800 mr-4 transition flex items-center bg-white p-2 rounded-full shadow-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </a>
    <h1 class="text-3xl font-extrabold text-gray-800">Add New Employee</h1>
  </div>

  {% if messages %}
    {% for message in messages %}
      <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded text-sm mb-6 animate-pulse">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <div class="bg-white rounded-2xl shadow-xl px-8 py-8 border border-gray-100">
    <form method="POST">
      {% csrf_token %}
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">First Name</label>
          <input type="text" name="first_name" required class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Last Name</label>
          <input type="text" name="last_name" required class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Username <span class="text-red-500">*</span></label>
          <input type="text" name="username" required class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
          <input type="email" name="email" required class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Department</label>
          <div class="relative">
            <select name="department" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition appearance-none">
              <option value="">-- Unassigned --</option>
              {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
              {% endfor %}
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
              <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Designation / Title</label>
          <input type="text" name="designation" placeholder="e.g. Senior Developer" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Date of Joining</label>
          <input type="date" name="date_joined" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Monthly Leave Quota</label>
          <input type="number" name="monthly_leave_quota" min="0" value="2" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Bank Name</label>
          <input type="text" name="bank_name" placeholder="e.g. State Bank of India" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">PAN Number</label>
          <input type="text" name="pan_number" placeholder="e.g. ABCDE1234F" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Account Number</label>
          <input type="text" name="account_number" placeholder="Enter bank account number" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Monthly Leave Quota</label>
          <input type="number" name="monthly_leave_quota" min="0" value="2" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition" />
        </div>
      </div>
      <div class="mb-8 p-6 bg-blue-50 rounded-xl border border-blue-100">
        <label class="block text-sm font-bold text-blue-900 mb-1">Temporary Password <span class="text-red-500">*</span></label>
        <p class="text-xs text-blue-700 mb-4 font-medium">The employee will use this password to log in for the very first time.</p>
        <div class="relative mt-1 max-w-sm rounded-md shadow-sm">
          <input type="password" name="password" required placeholder="Generate a secure password" class="w-full border border-blue-200 rounded-xl px-4 py-3 bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
        </div>
      </div>

      <div class="flex justify-end items-center gap-4 mt-8 border-t border-gray-100 pt-6">
        <a href="{% url 'admin_employees' %}" class="px-6 py-3 rounded-xl text-gray-600 hover:bg-gray-100 font-bold transition">Cancel</a>
        <button type="submit" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-200 transition transform hover:-translate-y-0.5">Register Employee</button>
      </div>

    </form>
  </div>
</div>
{% endblock %}

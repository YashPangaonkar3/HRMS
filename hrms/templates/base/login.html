<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HRMS | Secure Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Manrope', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    .glass-login {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .bg-abstract {
      background-image: 
        radial-gradient(at 0% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(225,39%,10%,1) 0, transparent 50%),
        radial-gradient(at 0% 100%, hsla(225,39%,10%,1) 0, transparent 50%),
        radial-gradient(at 50% 100%, hsla(225,39%,5%,1) 0, transparent 50%),
        radial-gradient(at 100% 100%, hsla(225,39%,10%,1) 0, transparent 50%);
      background-color: #0f172a;
    }
    .toggle-active {
      background: white;
      color: #1e293b;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .toggle-active-admin {
      background: #4361ee;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(67, 97, 238, 0.4);
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-login {
      animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>
</head>
<body class="bg-abstract flex items-center justify-center min-h-screen p-6 font-sans antialiased text-slate-900">

  <div class="glass-login p-12 rounded-[48px] shadow-2xl w-full max-w-lg animate-login border border-white/20">
    
    <div class="text-center mb-10">
      <div id="iconContainer" class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-600/10 text-blue-600 mb-6 transition-all duration-500 shadow-inner">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
      </div>
      <h1 id="loginTitle" class="text-4xl font-extrabold text-slate-900 tracking-tight font-display mb-2 transition-all duration-500">Personnel Hub</h1>
      <p class="text-slate-700 font-semibold uppercase tracking-[0.2em] text-[10px]">Secure Enterprise Authentication</p>
    </div>

    <!-- Role Selection -->
    <div class="flex bg-slate-200/50 p-1.5 rounded-2xl mb-10 relative" id="roleToggle">
      <div id="employeeTab" class="flex-1 text-center py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all duration-500 toggle-active cursor-pointer z-10" onclick="selectRole('employee')">
        Staff
      </div>
      <div id="adminTab" class="flex-1 text-center py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all duration-500 text-slate-700 cursor-pointer z-10" onclick="selectRole('admin')">
        Executive
      </div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="bg-rose-50 border-l-[6px] border-rose-500 text-rose-700 p-5 rounded-3xl mb-8 font-bold text-sm shadow-xl shadow-rose-500/5 animate-pulse">
          <div class="flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            {{ message }}
          </div>
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-6">
      {% csrf_token %}
      
      <div>
        <label class="block text-[10px] font-black text-slate-700 uppercase tracking-widest mb-3 px-1">Identity Vector</label>
        <div class="group relative">
          <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-slate-500 group-focus-within:text-blue-600 transition-colors">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </span>
          <input type="text" name="username" required placeholder="staff_id_v2"
                 class="block w-full pl-14 pr-5 py-4 bg-white/70 border border-slate-300 rounded-2xl leading-5 placeholder-slate-600 focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white sm:text-sm font-bold text-slate-900 transition-all shadow-sm">
        </div>
      </div>
      
      <div>
        <label class="block text-[10px] font-black text-slate-700 uppercase tracking-widest mb-3 px-1">Access Protocol</label>
        <div class="group relative">
          <span class="absolute inset-y-0 left-0 pl-5 flex items-center text-slate-500 group-focus-within:text-blue-600 transition-colors">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </span>
          <input type="password" name="password" required placeholder="••••••••"
                 class="block w-full pl-14 pr-5 py-4 bg-white/70 border border-slate-300 rounded-2xl leading-5 placeholder-slate-600 focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white sm:text-sm font-bold text-slate-900 transition-all shadow-sm">
        </div>
      </div>
      
      <button type="submit" id="submitBtn"
              class="w-full flex justify-center py-4 px-6 border-b-4 border-blue-700 rounded-2xl shadow-xl shadow-blue-500/20 text-xs font-black uppercase tracking-widest text-white bg-blue-600 hover:bg-blue-700 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
        Initialize Staff Session
      </button>
    </form>
  </div>

  <footer class="fixed bottom-10 text-slate-600 text-[10px] font-black uppercase tracking-[0.3em] text-center w-full">
    © 2026 <span class="text-blue-400 tracking-normal">@Yash</span> | All Rights Reserved
  </footer>

  <script>
    function selectRole(role) {
      const adminTab = document.getElementById('adminTab');
      const employeeTab = document.getElementById('employeeTab');
      const submitBtn = document.getElementById('submitBtn');
      const loginTitle = document.getElementById('loginTitle');
      const iconContainer = document.getElementById('iconContainer');
      
      if (role === 'admin') {
        adminTab.classList.add('toggle-active-admin');
        adminTab.classList.remove('text-slate-500');
        
        employeeTab.classList.remove('toggle-active');
        employeeTab.classList.add('text-slate-500');
        
        submitBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'border-blue-700', 'shadow-blue-500/20');
        submitBtn.classList.add('bg-slate-900', 'hover:bg-slate-800', 'border-slate-950', 'shadow-slate-900/40');
        
        iconContainer.classList.remove('bg-blue-600/10', 'text-blue-600');
        iconContainer.classList.add('bg-slate-900', 'text-white', 'shadow-xl');
        
        submitBtn.innerText = 'Establish Command Session';
        loginTitle.innerText = 'Executive Command';
      } else {
        employeeTab.classList.add('toggle-active');
        employeeTab.classList.remove('text-slate-500');
        
        adminTab.classList.remove('toggle-active-admin');
        adminTab.classList.add('text-slate-500');
        
        submitBtn.classList.remove('bg-slate-900', 'hover:bg-slate-800', 'border-slate-950', 'shadow-slate-900/40');
        submitBtn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'border-blue-700', 'shadow-blue-500/20');
        
        iconContainer.classList.remove('bg-slate-900', 'text-white', 'shadow-xl');
        iconContainer.classList.add('bg-blue-600/10', 'text-blue-600');
        
        submitBtn.innerText = 'Initialize Staff Session';
        loginTitle.innerText = 'Personnel Hub';
      }
    }
  </script>
</body>
</html>
>
</body>
</html>
